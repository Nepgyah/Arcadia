{% extends 'public-site/base.html' %}
{% load static %}

{% block stylesheets %}
<link href="{% static "css/globals/_header.css" %}" rel="stylesheet" type="text/css">
<link href="{% static "css/misc/misc.css" %}" rel="stylesheet" type="text/css">
<link href="{% static "css/globals/_base.css" %}" rel="stylesheet" type="text/css">
<link href="{% static "css/globals/_footer.css" %}" rel="stylesheet" type="text/css">
{% endblock %}

{% block content %}

    {% include 'public-site/header.html' %}

    <section id="error">
        <div class="flex-grid">
            <div class="image"></div>
            <div class="text">
                <h1>404 - Page Not Found</h1>
                <p>Sorry, the page you are looking for does not exist.</p>
                <a href="/">
                    <div class="btn btn-hero btn-primary">Home</div>
                </a>
            </div>
        </div>
    </section>

    {% include 'public-site/footer.html' %}

{% endblock %}
